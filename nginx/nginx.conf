worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # Hide Nginx version from attackers
  server_tokens off;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for"';

  access_log /var/log/nginx/access.log main;
  sendfile on;
  keepalive_timeout 65;
  client_max_body_size 10M;

  # ── Gzip compression ──────────────────────────────────
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

  # ── Rate limiting zones ───────────────────────────────
  # Strict zone for login (brute-force protection)
  limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
  # General API zone
  limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
  # Frontend zone
  limit_req_zone $binary_remote_addr zone=web:10m rate=120r/m;

  limit_req_status 429;

  # ── Upstreams ─────────────────────────────────────────
  upstream api {
    server api:4000;
    keepalive 32;
  }

  upstream web {
    server web:3000;
    keepalive 32;
  }

  # ── HTTP → HTTPS redirect + ACME challenge ────────────
  server {
    listen 80;
    server_name _;

    # Let's Encrypt ACME challenge (certbot webroot)
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    # Redirect all other HTTP traffic to HTTPS
    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ── HTTPS main server ─────────────────────────────────
  # ┌─────────────────────────────────────────────────────┐
  # │ BEFORE FIRST DEPLOY:                                │
  # │  1. Replace YOUR_DOMAIN below with your domain      │
  # │  2. Run certbot to generate certs (see README)      │
  # │  3. Uncomment this whole server block               │
  # └─────────────────────────────────────────────────────┘
  server {
    listen 443 ssl;
    http2 on;
    server_name YOUR_DOMAIN;

    # ── SSL certificates (Let's Encrypt / certbot) ─────
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/YOUR_DOMAIN/chain.pem;

    # ── SSL hardening ──────────────────────────────────
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # ── Security headers ───────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options           "DENY"                    always;
    add_header X-Content-Type-Options    "nosniff"                 always;
    add_header X-XSS-Protection          "1; mode=block"           always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;

    # ── Block common attack patterns ──────────────────
    location ~* \.(env|git|gitignore|htaccess|htpasswd|ini|log|sh|bak|swp|sql)$ {
      deny all;
      return 404;
    }

    location ~* \.\. {
      deny all;
      return 404;
    }

    location ~* (wp-admin|wp-login|wp-content|xmlrpc\.php) {
      deny all;
      return 404;
    }

    location ~* \.(php|php3|php4|php5|phtml|asp|aspx|jsp|cgi)$ {
      deny all;
      return 404;
    }

    location ~* /(admin|phpmyadmin|pma|myadmin|manager|shell|webshell|cmd|exec) {
      deny all;
      return 404;
    }

    location ~* ^/(etc|proc|sys|dev)/ {
      deny all;
      return 404;
    }

    # ── Login endpoint — strict rate limit ────────────
    location = /api/v1/auth/login {
      limit_req zone=login burst=3 nodelay;
      proxy_pass http://api;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/auth/login {
      limit_req zone=login burst=3 nodelay;
      proxy_pass http://api;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── API routes ────────────────────────────────────
    location /api {
      limit_req zone=api burst=30 nodelay;
      proxy_pass http://api;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_cache_bypass $http_upgrade;

      proxy_connect_timeout 10s;
      proxy_read_timeout    30s;
      proxy_send_timeout    30s;
    }

    # ── Health check (internal only) ──────────────────
    location /health {
      allow 127.0.0.1;
      allow 172.16.0.0/12;
      deny all;
      proxy_pass http://api;
      proxy_set_header Host $host;
    }

    # ── Frontend ──────────────────────────────────────
    location / {
      limit_req zone=web burst=60 nodelay;
      proxy_pass http://web;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection 'upgrade';
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_cache_bypass $http_upgrade;

      proxy_connect_timeout 10s;
      proxy_read_timeout    60s;
    }
  }
}
