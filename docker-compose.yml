# ============================================
# Kharrazi - Docker Compose
# ============================================
# Usage:
#   docker-compose up -d          → start all services
#   docker-compose logs -f api    → stream API logs
#   docker-compose down -v        → stop and remove volumes

networks:
  kharrazi-net:
    driver: bridge

volumes:
  postgres-data:
    driver: local
  uploads-data:
    driver: local
  certbot-www:
    driver: local
  certbot-conf:
    driver: local
  backup-data:
    driver: local

services:
  # ── PostgreSQL ──────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: kharrazi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: kharrazi_user
      POSTGRES_PASSWORD: kharrazi_pass
      POSTGRES_DB: kharrazi_db
    volumes:
      - postgres-data:/var/lib/postgresql/data
    # Port 5432 NOT exposed externally — only accessible within Docker network
    # Uncomment only for local development/debugging:
    # ports:
    #   - "127.0.0.1:5432:5432"
    networks:
      - kharrazi-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kharrazi_user -d kharrazi_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── API (Node.js + Express) ─────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: kharrazi-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_PORT: 4000
      DATABASE_URL: postgresql://kharrazi_user:kharrazi_pass@postgres:5432/kharrazi_db?schema=public
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-change-me-in-production-access}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-in-production-refresh}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost,http://localhost:3000,http://127.0.0.1}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@kharrazi.ma}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_WHATSAPP_FROM: ${TWILIO_WHATSAPP_FROM:-whatsapp:+14155238886}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
    # Port 4000 NOT exposed externally — only Nginx can reach the API
    # Uncomment only for local debugging:
    # ports:
    #   - "127.0.0.1:4000:4000"
    volumes:
      - uploads-data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - kharrazi-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ── Web (Next.js) ───────────────────────────
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api
    container_name: kharrazi-web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: /api
      NEXT_INTERNAL_API_URL: http://api:4000/api
      NEXT_PUBLIC_APP_NAME: "Kharrazi Fleet"
      NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - kharrazi-net

  # ── Nginx Reverse Proxy ─────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: kharrazi-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot-www:/var/www/certbot:ro
      - certbot-conf:/etc/letsencrypt:ro
    depends_on:
      - api
      - web
    networks:
      - kharrazi-net

  # ── Certbot (SSL certificate renewal) ──────
  # Run once manually to get first cert:
  #   docker run --rm -v certbot-www:/var/www/certbot -v certbot-conf:/etc/letsencrypt \
  #     certbot/certbot certonly --webroot -w /var/www/certbot \
  #     -d YOUR_DOMAIN --email YOUR_EMAIL --agree-tos --no-eff-email
  # Then restart nginx. Renewal is handled automatically by this service.
  certbot:
    image: certbot/certbot:latest
    container_name: kharrazi-certbot
    volumes:
      - certbot-www:/var/www/certbot
      - certbot-conf:/etc/letsencrypt
    # Renew every 12 hours; certbot only renews when cert is <30 days from expiry
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done'"
    networks:
      - kharrazi-net

  # ── PostgreSQL Backup ───────────────────────
  # Runs pg_dump every 24 hours, keeps last 7 backups in backup-data volume.
  # To trigger a manual backup: docker exec kharrazi-backup /backup.sh
  backup:
    image: postgres:16-alpine
    container_name: kharrazi-backup
    restart: unless-stopped
    environment:
      PGPASSWORD: kharrazi_pass
      PGHOST: postgres
      PGUSER: kharrazi_user
      PGDATABASE: kharrazi_db
      BACKUP_KEEP_DAYS: "7"
    volumes:
      - backup-data:/backups
      - ./scripts/backup.sh:/backup.sh:ro
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c", "sh /backup.sh && while true; do sleep 86400 && sh /backup.sh; done"]
    networks:
      - kharrazi-net
